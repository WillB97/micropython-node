<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- TODO make icon -->
  <link rel="icon" href="favicon.ico">

  <title>Powergrid Monitoring</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.14.1/mqtt.min.js"
    integrity="sha512-og7eV3frrnek0Yx80Y4mVyfi3uMc2CHgRl5wBIEsabDd+G8KGwWtx+XpxDimWNr3+NirTBhNyxTTqImafjKemQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="text-center">
  <div class="container my-5">
    <h1>Electromagnetic Powergrid Monitoring</h1>
    <p>Last report: <b id="last-report-time"></b></p>
    <table class="table table-hover align-middle" id="deviceState">
      <thead>
        <th>Node</th>
        <th>Serial</th>
        <th>RFM Last Seen</th>
        <th>WiFi Last Seen</th>
        <th>Offline?</th>
        <th>Extra Data</th>
      </thead>
      <tbody>
        <tr style="visibility: hidden;" id="-row" node-id="0"></tr>
      </tbody>
    </table>
  </div>

</body>
<script lang="js">
  function bisectLeft(arr, value) {
    for (let index = 0; index < arr.length; index++) {
      const element = arr[index];
      if (value < element) {
        return arr[index - 1];
      }
    }
    return arr[arr.length - 1];
  }
  var STATE = {};
  const client = mqtt.connect("wss://mqtt-direct.wbb.pw:8884", { username: "guest", password: "guest" })
  client.on("connect", () => {
    client.subscribe("state", (err) => {
      if (err) {
        console.log("Failed to subscribe");
      }
    });
  });
  client.on("message", (topic, message) => {
    console.log(`Message received: (${topic}) ${message.toString()}`);
    STATE = JSON.parse(message.toString());
    $("#last-report-time").text(new Date(STATE['current_time'] * 1000).toLocaleString());
    let seen_ids = [];
    $("#deviceState tbody tr").each(function () { seen_ids.push(parseInt($(this).attr('node-id'), 10)); });
    seen_ids = seen_ids.sort();
    for (const [key, value] of Object.entries(STATE['devices'])) {
      let rfm_last_seen = (value['rfm'] > 0) ? Math.floor(STATE['current_time'] - value['rfm']) : '-';
      let wifi_last_seen = (value['wifi'] > 0) ? Math.floor(STATE['current_time'] - value['wifi']) : '-';
      let colouring = "";
      if (value['offline_confidence'] > 60) {
        colouring = "table-danger";
      } else if (value['offline_confidence'] > 0) {
        colouring = "table-warning";
      }
      if ($(`#${key}-row`).length == 0) {
        const node_id = value['node_id'];
        const last_id = bisectLeft(seen_ids, node_id);
        seen_ids.push(node_id);
        seen_ids = seen_ids.sort();

        $(`#deviceState tbody tr[node-id=${last_id}]`).after(
          `<tr class="${colouring}" id="${key}-row" node-id="${node_id}">
            <td id="${key}-node-id">${node_id}</td>
            <td id="${key}-serial">${key}</td>
            <td id="${key}-rfm-last"></td>
            <td id="${key}-wifi-last"></td>
            <td id="${key}-offline"></td>
            <td><details><pre style="text-align:left"><code id="${key}-extra">
            </code></pre></details></td>
          </tr>`);
      }

      $(`#${key}-rfm-last`).text(`${rfm_last_seen} secs`);
      $(`#${key}-wifi-last`).text(`${wifi_last_seen} secs`);
      $(`#${key}-offline`).text(`${value['offline_confidence']}%`);
      $(`#${key}-extra`).text(JSON.stringify(value['extra_data'], null, 2));
      $(`#${key}-row`).removeClass("table-danger").removeClass("table-warning").addClass(colouring);
    }
  });
</script>

</html>
