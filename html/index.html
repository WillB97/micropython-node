<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- TODO make icon -->
  <link rel="icon" href="favicon.ico">

  <title>Powergrid Monitoring</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.14.1/mqtt.min.js"
    integrity="sha512-og7eV3frrnek0Yx80Y4mVyfi3uMc2CHgRl5wBIEsabDd+G8KGwWtx+XpxDimWNr3+NirTBhNyxTTqImafjKemQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body class="text-center">
  <div class="container my-5">
    <h1>Electromagnetic Powergrid Monitoring</h1>
    <table class="table table-hover align-middle" id="deviceState">
      <thead>
        <th>Node</th>
        <th>Serial</th>
        <th>RFM Last Seen</th>
        <th>WiFi Last Seen</th>
        <th>Offline?</th>
        <th>Extra Data</th>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</body>
<script lang="js">
  var STATE = {};
  const client = mqtt.connect("wss://mqtt-direct.wbb.pw:8884", { username: "guest", password: "guest" })
  client.on("connect", () => {
    client.subscribe("state", (err) => {
      if (err) {
        console.log("Failed to subscribe");
      }
    });
  });
  client.on("message", (topic, message) => {
    console.log(`Message received: (${topic}) ${message.toString()}`);
    STATE = JSON.parse(message.toString());
    // TODO if row exists for device, just update instead of recreating
    // TODO sort by node id (insertion sort?)
    $('#deviceState tbody').empty();
    for (const [key, value] of Object.entries(STATE['devices'])) {
      let rfm_last_seen = (value['rfm'] > 0) ? Math.floor(STATE['current_time'] - value['rfm']) : '-';
      let wifi_last_seen = (value['wifi'] > 0) ? Math.floor(STATE['current_time'] - value['wifi']) : '-';
      let colouring = "";
      if (value['offline_confidence'] > 80) {
        colouring = "table-danger";
      } else if (value['offline_confidence'] > 30) {
        colouring = "table-warning";
      }
      $('#deviceState tbody:last-child').append(
        `<tr class="${colouring}" id="${key}-row">
          <td>${value['node_id']}</td>
          <td>${key}</td>
          <td>${rfm_last_seen} secs</td>
          <td>${wifi_last_seen} secs</td>
          <td>${value['offline_confidence']}%</td>
          <td><details><pre style="text-align:left"><code>
            ${JSON.stringify(value['extra_data'], null, 2)}
          </code></pre></details></td>
        </tr>`);
    }
  });
</script>

</html>
